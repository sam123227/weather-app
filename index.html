<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="card">
    <h1>☁️☀️ Weather App</h1>
    <h3 id="dateTime"></h3>
    <input type="text" id="city" placeholder="Enter your city or Location">
    <button onclick="getWeather()">Get Weather Details</button>
    <p id="errorMessage"></p>
    <div id="weatherDetails">
         <img id="weatherIcon" alt="Weather Icon">
        <h2 id="cityName"></h2>
        <h2 id="temperature"></h2>
        <h2 id="humidity"></h2>
        <h2 id="windSpeed"></h2>
        <h2 id="condition"></h2>
    </div>
    </div>
    <script src="script2.js"></script>
</body>
</html>
